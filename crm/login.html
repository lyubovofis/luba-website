<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в CRM - Денежный Водопад</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg: #e0e5ec;
            --primary: #7c3aed;
            --primary-light: #a78bfa;
            --text: #1e293b;
            --text-light: #64748b;
            --shadow: 9px 9px 16px #a3b1c6, -9px -9px 16px #ffffff;
            --shadow-inset: inset 6px 6px 10px #a3b1c6, inset -6px -6px 10px #ffffff;
            --radius: 20px;
            --danger: #ef4444;
            --success: #10b981;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-container { width: 100%; max-width: 450px; }
        
        .login-card {
            background: var(--bg);
            border-radius: var(--radius);
            padding: 50px 40px;
            box-shadow: var(--shadow);
        }
        
        .logo-section { text-align: center; margin-bottom: 40px; }
        
        .logo-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            color: white;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
        }
        
        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .subtitle {
            color: var(--text-light);
            font-size: 14px;
        }
        
        .form-group { margin-bottom: 25px; }
        
        .form-label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            font-size: 14px;
            color: var(--text);
        }
        
        .form-input {
            width: 100%;
            padding: 14px 18px;
            background: var(--bg);
            box-shadow: var(--shadow-inset);
            border: none;
            border-radius: 12px;
            font-size: 15px;
            color: var(--text);
            transition: all 0.3s;
        }
        
        .form-input:focus {
            outline: none;
            box-shadow: var(--shadow-inset), 0 0 0 3px var(--primary-light);
        }
        
        .form-input::placeholder {
            color: var(--text-light);
            opacity: 0.6;
        }
        
        .btn {
            width: 100%;
            padding: 14px 24px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            box-shadow: var(--shadow);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(124, 58, 237, 0.3);
        }
        
        .btn-primary:active { transform: translateY(0); }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .error-message {
            background: #fee2e2;
            color: var(--danger);
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }
        
        .success-message {
            background: #dcfce7;
            color: var(--success);
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }
        
        .remember-section {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 20px 0;
        }
        
        .checkbox {
            width: 20px;
            height: 20px;
            background: var(--bg);
            box-shadow: var(--shadow-inset);
            border: none;
            border-radius: 6px;
            cursor: pointer;
            position: relative;
            appearance: none;
        }
        
        .checkbox:checked {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            box-shadow: var(--shadow);
        }
        
        .checkbox:checked::after {
            content: '✓';
            color: white;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 12px;
        }
        
        .footer {
            text-align: center;
            margin-top: 30px;
            color: var(--text-light);
            font-size: 13px;
        }
        
        .debug {
            background: #f0f0f0;
            padding: 10px;
            margin-top: 20px;
            border-radius: 8px;
            font-size: 12px;
            font-family: monospace;
        }
        
        @media (max-width: 480px) {
            .login-card { padding: 40px 30px; }
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo-section">
                <div class="logo-icon">💰</div>
                <h1>CRM Pro</h1>
                <p class="subtitle">Денежный Водопад</p>
            </div>
            
            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">Email или Username</label>
                    <input type="text" class="form-input" id="username" placeholder="lyubov.ofis@gmail.com или Luba" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Пароль</label>
                    <input type="password" class="form-input" id="password" placeholder="Luba1488@" required>
                </div>
                
                <div class="remember-section">
                    <input type="checkbox" class="checkbox" id="remember" checked>
                    <label for="remember" style="cursor:pointer">Запомнить на 14 дней</label>
                </div>
                
                <button type="submit" class="btn btn-primary" id="loginBtn">
                    Войти в систему
                </button>
            </form>
            
            <div class="debug" id="debug">
                Проверка входа...
            </div>
            
            <div class="footer">
                <p>© 2025 Любовь Лукащук</p>
                <p style="margin-top:10px;font-size:11px">
                    Email: lyubov.ofis@gmail.com / Luba1488@<br>
                    Username: Luba / Luba1488@
                </p>
            </div>
        </div>
    </div>
    
    <script>
        // Debug info
        document.getElementById('debug').textContent = 'Страница загружена. Готов к входу.';
        
        // Check if already logged in
        const isAuthenticated = localStorage.getItem('crm_authenticated');
        const authExpiration = localStorage.getItem('crm_auth_expiration');
        
        if (isAuthenticated && authExpiration) {
            const now = new Date().getTime();
            const expiration = parseInt(authExpiration);
            
            if (now < expiration) {
                document.getElementById('debug').textContent = 'Уже авторизован, перенаправляю...';
                window.location.href = '/crm/';
            } else {
                localStorage.removeItem('crm_authenticated');
                localStorage.removeItem('crm_auth_expiration');
                localStorage.removeItem('crm_user');
                document.getElementById('debug').textContent = 'Сессия истекла, нужен новый вход.';
            }
        }
        
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;
            const loginBtn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMessage');
            const successMsg = document.getElementById('successMessage');
            const debug = document.getElementById('debug');
            
            // Clear messages
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';
            
            // Disable button
            loginBtn.disabled = true;
            loginBtn.textContent = 'Проверка...';
            debug.textContent = `Проверяю вход: ${username}`;
            
            // Check credentials - multiple methods
            try {
                let success = false;
                let userData = null;
                
                // Method 1: Hardcoded credentials
                if ((username === 'Luba' || username === 'luba') && password === 'Luba1488@') {
                    success = true;
                    userData = {
                        username: 'Luba',
                        name: 'Любовь Лукащук',
                        role: 'admin',
                        source: 'hardcoded'
                    };
                    debug.textContent = '✅ Вход через hardcoded credentials';
                }
                // Method 2: Email variants
                else if ((username === 'lyubov.ofis@gmail.com' || username.includes('lyubov')) && password === 'Luba1488@') {
                    success = true;
                    userData = {
                        username: 'lyubov.ofis@gmail.com',
                        name: 'Любовь Лукащук',
                        role: 'admin',
                        source: 'email'
                    };
                    debug.textContent = '✅ Вход через email';
                }
                // Method 3: Alternative passwords
                else if ((username === 'Luba' || username === 'lyubov.ofis@gmail.com') && 
                         (password === 'admin' || password === '1488' || password === 'luba1488')) {
                    success = true;
                    userData = {
                        username: username,
                        name: 'Любовь Лукащук',
                        role: 'admin',
                        source: 'alternative'
                    };
                    debug.textContent = '✅ Вход через альтернативный пароль';
                }
                
                if (success && userData) {
                    // Set authentication
                    localStorage.setItem('crm_authenticated', 'true');
                    localStorage.setItem('crm_user', JSON.stringify(userData));
                    
                    // Set expiration
                    const expirationDate = new Date();
                    if (remember) {
                        expirationDate.setDate(expirationDate.getDate() + 14);
                    } else {
                        expirationDate.setHours(expirationDate.getHours() + 24);
                    }
                    localStorage.setItem('crm_auth_expiration', expirationDate.getTime());
                    
                    // Show success
                    successMsg.textContent = `Добро пожаловать, ${userData.name}!`;
                    successMsg.style.display = 'block';
                    debug.textContent = '✅ Успешно! Перенаправляю в CRM...';
                    
                    setTimeout(() => {
                        window.location.href = '/crm/';
                    }, 1500);
                } else {
                    throw new Error(`Неверные данные для входа. Попробовайте: Luba/Luba1488@ или lyubov.ofis@gmail.com/Luba1488@`);
                }
                
            } catch (error) {
                errorMsg.textContent = error.message;
                errorMsg.style.display = 'block';
                debug.textContent = `❌ Ошибка: ${error.message}`;
                
                // Shake animation
                document.querySelector('.login-card').style.animation = 'shake 0.5s';
                setTimeout(() => {
                    document.querySelector('.login-card').style.animation = '';
                }, 500);
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = 'Войти в систему';
            }
        });
    </script>
</body>
</html>
