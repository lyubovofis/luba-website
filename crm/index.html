<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Pro - Денежный Водопад</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg: #e0e5ec;
            --bg-light: #f0f5fc;
            --primary: #7c3aed;
            --primary-light: #a78bfa;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --text: #1e293b;
            --text-light: #64748b;
            --shadow: 9px 9px 16px #a3b1c6, -9px -9px 16px #ffffff;
            --shadow-inset: inset 6px 6px 10px #a3b1c6, inset -6px -6px 10px #ffffff;
            --radius: 20px;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 280px;
            height: 100vh;
            background: var(--bg);
            padding: 30px 20px;
            box-shadow: var(--shadow);
            z-index: 100;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 40px;
            padding: 20px;
            background: var(--bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }
        
        .logo-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
        }
        
        .nav-menu {
            list-style: none;
        }
        
        .nav-link {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 20px;
            margin-bottom: 10px;
            color: var(--text-light);
            text-decoration: none;
            border-radius: 15px;
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .nav-link:hover {
            box-shadow: var(--shadow);
            color: var(--primary);
        }
        
        .nav-link.active {
            box-shadow: var(--shadow-inset);
            color: var(--primary);
        }
        
        .main-content {
            margin-left: 280px;
            padding: 30px;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: var(--bg);
            padding: 20px 30px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            background: var(--bg);
            box-shadow: var(--shadow);
            color: var(--text);
        }
        
        .btn:hover { transform: translateY(-2px); }
        .btn:active { box-shadow: var(--shadow-inset); }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: var(--bg);
            padding: 25px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            position: relative;
        }
        
        .stat-icon {
            width: 50px;
            height: 50px;
            background: var(--bg);
            box-shadow: var(--shadow-inset);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 15px;
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--text);
        }
        
        .stat-label {
            font-size: 14px;
            color: var(--text-light);
            margin-top: 5px;
        }
        
        .kanban-board {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
        }
        
        .kanban-column {
            background: var(--bg);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--shadow-inset);
            min-height: 500px;
        }
        
        .column-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            margin: -20px -20px 20px;
            background: var(--bg);
            border-radius: var(--radius) var(--radius) 0 0;
            box-shadow: var(--shadow);
        }
        
        .column-badge {
            width: 30px;
            height: 30px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }
        
        .lead-card {
            background: var(--bg);
            border-radius: 15px;
            padding: 18px;
            margin-bottom: 15px;
            box-shadow: var(--shadow);
            cursor: move;
            transition: all 0.3s;
        }
        
        .lead-card:hover { transform: translateX(5px); }
        
        .lead-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        
        .lead-name {
            font-weight: 600;
            font-size: 16px;
            color: var(--text);
            cursor: pointer;
        }
        
        .lead-actions {
            display: flex;
            gap: 8px;
        }
        
        .lead-action {
            width: 28px;
            height: 28px;
            background: var(--bg);
            box-shadow: var(--shadow-inset);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .lead-meta {
            font-size: 13px;
            color: var(--text-light);
            margin-bottom: 10px;
        }
        
        .lead-tags {
            display: flex;
            gap: 8px;
        }
        
        .lead-tag {
            padding: 4px 10px;
            background: var(--bg);
            box-shadow: var(--shadow-inset);
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            color: var(--primary);
        }
        
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .modal.active { display: flex; }
        
        .modal-content {
            background: var(--bg);
            border-radius: var(--radius);
            width: 90%;
            max-width: 600px;
            box-shadow: var(--shadow);
        }
        
        .modal-header {
            padding: 25px;
            border-bottom: 1px solid rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-close {
            width: 35px;
            height: 35px;
            background: var(--bg);
            box-shadow: var(--shadow);
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        
        .modal-body { padding: 25px; }
        
        .form-group { margin-bottom: 20px; }
        
        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
        }
        
        .form-input, .form-select {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg);
            box-shadow: var(--shadow-inset);
            border: none;
            border-radius: 12px;
            font-size: 14px;
        }
        
        .form-input:focus, .form-select:focus {
            outline: none;
            box-shadow: var(--shadow-inset), 0 0 0 3px var(--primary-light);
        }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        @media (max-width: 768px) {
            .sidebar { width: 70px; padding: 20px 10px; }
            .sidebar span:not(.nav-icon) { display: none; }
            .main-content { margin-left: 70px; }
            .kanban-board { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="logo">
            <div class="logo-icon">💰</div>
            <div style="flex:1">
                <div style="font-weight:700">CRM Pro</div>
                <div style="font-size:12px;color:var(--text-light)">Денежный Водопад</div>
            </div>
        </div>
        
        <nav>
            <ul class="nav-menu">
                <li><a class="nav-link active" onclick="showTab('dashboard')">
                    <span class="nav-icon">📊</span><span>Dashboard</span>
                </a></li>
                <li><a class="nav-link" onclick="showTab('kanban')">
                    <span class="nav-icon">📋</span><span>Воронка</span>
                </a></li>
                <li><a class="nav-link" onclick="showTab('quiz')">
                    <span class="nav-icon">🎯</span><span>Квиз лиды</span>
                </a></li>
            </ul>
        </nav>
        
        <button class="btn" onclick="logout()" style="position:absolute;bottom:30px;left:20px;right:20px">
            🚪 Выйти
        </button>
    </aside>
    
    <main class="main-content">
        <div id="dashboard" class="tab-content active">
            <header class="header">
                <div>
                    <h1>Dashboard</h1>
                    <p style="color:var(--text-light);font-size:14px">Добро пожаловать!</p>
                </div>
                <button class="btn btn-primary" onclick="showAddLeadModal()">+ Добавить лида</button>
            </header>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon">👥</div>
                    <div class="stat-value" id="totalLeads">0</div>
                    <div class="stat-label">Всего лидов</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">💬</div>
                    <div class="stat-value" id="consultations">0</div>
                    <div class="stat-label">Консультации</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">💰</div>
                    <div class="stat-value" id="payments">0</div>
                    <div class="stat-label">Оплаты</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">📊</div>
                    <div class="stat-value" id="conversion">0%</div>
                    <div class="stat-label">Конверсия</div>
                </div>
            </div>
        </div>
        
        <div id="kanban" class="tab-content">
            <header class="header">
                <h1>Воронка продаж</h1>
                <button class="btn btn-primary" onclick="showAddLeadModal()">+ Добавить лида</button>
            </header>
            
            <div class="kanban-board">
                <div class="kanban-column" data-stage="new">
                    <div class="column-header">
                        <span>📝 Новые</span>
                        <div class="column-badge" id="count-new">0</div>
                    </div>
                    <div class="leads-container" id="new-leads"></div>
                </div>
                
                <div class="kanban-column" data-stage="consultation">
                    <div class="column-header">
                        <span>💬 Консультация</span>
                        <div class="column-badge" id="count-consultation">0</div>
                    </div>
                    <div class="leads-container" id="consultation-leads"></div>
                </div>
                
                <div class="kanban-column" data-stage="paid">
                    <div class="column-header">
                        <span>✅ Оплатили</span>
                        <div class="column-badge" id="count-paid">0</div>
                    </div>
                    <div class="leads-container" id="paid-leads"></div>
                </div>
            </div>
        </div>
        
        <div id="quiz" class="tab-content">
            <header class="header">
                <h1>Квиз лиды</h1>
                <button class="btn btn-primary" onclick="addAllToFunnel()">Добавить все в воронку</button>
            </header>
            
            <div id="quiz-leads-list" style="background:var(--bg);padding:20px;border-radius:var(--radius);box-shadow:var(--shadow-inset);">
                <p style="text-align:center;color:var(--text-light)">Нет новых лидов с квиза</p>
            </div>
        </div>
    </main>
    
    <div id="addLeadModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Новый лид</h2>
                <button class="modal-close" onclick="closeAddLeadModal()">✕</button>
            </div>
            <div class="modal-body">
                <form id="addLeadForm">
                    <div class="form-group">
                        <label class="form-label">Имя *</label>
                        <input type="text" class="form-input" id="leadName" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Телефон *</label>
                        <input type="tel" class="form-input" id="leadPhone" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-input" id="leadEmail">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Возраст</label>
                        <input type="number" class="form-input" id="leadAge" min="18" max="100">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Источник</label>
                        <select class="form-select" id="leadSource">
                            <option value="manual">Вручную</option>
                            <option value="instagram">Instagram</option>
                            <option value="facebook">Facebook</option>
                            <option value="tiktok">TikTok</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Этап</label>
                        <select class="form-select" id="leadStage">
                            <option value="new">Новый</option>
                            <option value="consultation">Консультация</option>
                            <option value="paid">Оплачен</option>
                        </select>
                    </div>
                    <div style="display:flex;gap:15px;margin-top:25px">
                        <button type="button" class="btn" onclick="closeAddLeadModal()" style="flex:1">Отмена</button>
                        <button type="submit" class="btn btn-primary" style="flex:1">Добавить</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div id="leadModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Детали лида</h2>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>
    
    <script>
        // Debug info
        console.log('CRM Dashboard loading...');
        
        // Check auth
        if (!localStorage.getItem('crm_authenticated')) {
            console.log('Not authenticated, redirecting...');
            window.location.href = '/crm/login.html';
        }
        
        console.log('Auth check passed');
        
        // State
        let allLeads = [];
        let quizLeadsNotInFunnel = [];
        let draggedElement = null;
        const SUPABASE_URL = 'https://rntranckosfsnaakirqh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJudHJhbmNrb3Nmc25hYWtpcnFoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzI2MzY0MjYsImV4cCI6MjA0ODIxMjQyNn0.oaBupXryNkc1NlPV7qlanC8KFBydPygR1lncVl1qzfE';
        
        // Functions
        function showTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }
        
        function showAddLeadModal() {
            document.getElementById('addLeadModal').classList.add('active');
        }
        
        function closeAddLeadModal() {
            document.getElementById('addLeadModal').classList.remove('active');
            document.getElementById('addLeadForm').reset();
        }
        
        function closeModal() {
            document.getElementById('leadModal').classList.remove('active');
        }
        
        function logout() {
            localStorage.clear();
            window.location.href = '/crm/login.html';
        }
        
        async function loadData() {
            console.log('Loading data from Supabase...');
            
            try {
                // Check if Supabase is loaded
                if (typeof window.supabase === 'undefined') {
                    console.error('Supabase library not loaded, loading fallback data');
                    showFallbackData();
                    return;
                }
                
                const { createClient } = window.supabase;
                const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
                console.log('Supabase client created');
                
                // Test connection first
                const { data: testData, error: testError } = await supabase
                    .from('quiz_leads')
                    .select('id')
                    .limit(1);
                
                if (testError) {
                    console.error('Supabase connection test failed:', testError);
                    showFallbackData();
                    return;
                }
                
                console.log('Supabase connection successful');
                
                // Load all leads from quiz_leads table
                const { data, error } = await supabase
                    .from('quiz_leads')
                    .select('*')
                    .order('created_at', { ascending: false });
                
                if (error) {
                    console.error('Error loading leads:', error);
                    showFallbackData();
                    return;
                }
                
                console.log(`Loaded ${data?.length || 0} leads from Supabase`);
                
                if (data && data.length > 0) {
                    // Separate quiz leads (not in funnel) from CRM leads (in funnel)
                    quizLeadsNotInFunnel = data.filter(lead => !lead.stage || lead.stage === 'quiz_new');
                    allLeads = data.filter(lead => lead.stage && lead.stage !== 'quiz_new');
                    
                    console.log(`Quiz leads: ${quizLeadsNotInFunnel.length}, Funnel leads: ${allLeads.length}`);
                    
                    renderAll();
                    
                    // Show success message
                    const user = JSON.parse(localStorage.getItem('crm_user') || '{}');
                    document.querySelector('h1').textContent = `Dashboard - ${data.length} лидов загружено`;
                } else {
                    console.log('No leads found in database');
                    showFallbackData();
                }
            } catch (error) {
                console.error('Critical error loading data:', error);
                showFallbackData();
            }
        }
        
        function showFallbackData() {
            console.log('Showing fallback demo data');
            allLeads = [
                {
                    id: 1, 
                    name: 'Demo Lead - Supabase не подключен', 
                    phone: '+380501234567', 
                    stage: 'new', 
                    created_at: new Date().toISOString(),
                    main_block: 'Демо данные'
                }
            ];
            quizLeadsNotInFunnel = [
                {
                    id: 2,
                    name: 'Demo Quiz Lead',
                    phone: '+380501234568',
                    main_block: 'Проблема с подключением',
                    quiz_answers: {currentIncome: '1000', desiredIncome: '3000'},
                    created_at: new Date().toISOString()
                }
            ];
            renderAll();
            
            // Show error message in header
            document.querySelector('h1').innerHTML = 'Dashboard - <span style="color: red">Ошибка подключения к Supabase</span>';
        }
        
        function renderAll() {
            renderKanban();
            renderQuizLeads();
            updateStats();
        }
        
        function renderKanban() {
            ['new', 'consultation', 'paid'].forEach(stage => {
                const container = document.getElementById(`${stage}-leads`);
                const leads = allLeads.filter(l => l.stage === stage);
                document.getElementById(`count-${stage}`).textContent = leads.length;
                
                container.innerHTML = '';
                leads.forEach(lead => {
                    const card = createLeadCard(lead);
                    container.appendChild(card);
                });
            });
        }
        
        function createLeadCard(lead) {
            const card = document.createElement('div');
            card.className = 'lead-card';
            card.draggable = true;
            card.dataset.id = lead.id;
            
            card.innerHTML = `
                <div class="lead-header">
                    <div class="lead-name" onclick="showLeadDetails(${lead.id})">${lead.name || 'Без имени'}</div>
                    <div class="lead-actions">
                        <button class="lead-action" onclick="contactLead('${lead.phone}',${lead.id})">💬</button>
                        <button class="lead-action" onclick="moveToNext(${lead.id})">➡️</button>
                    </div>
                </div>
                <div class="lead-meta">📱 ${lead.phone || 'Нет телефона'}</div>
                ${lead.age ? `<div class="lead-meta">👤 ${lead.age} лет</div>` : ''}
                <div class="lead-meta">📅 ${new Date(lead.created_at).toLocaleDateString('ru')}</div>
                <div class="lead-tags">
                    ${lead.main_block ? `<span class="lead-tag">${lead.main_block}</span>` : ''}
                    ${lead.source ? `<span class="lead-tag">${lead.source}</span>` : ''}
                </div>
            `;
            
            card.addEventListener('dragstart', e => { draggedElement = card; card.style.opacity = '0.5'; });
            card.addEventListener('dragend', e => { card.style.opacity = ''; });
            
            return card;
        }
        
        function renderQuizLeads() {
            const container = document.getElementById('quiz-leads-list');
            if (quizLeadsNotInFunnel.length === 0) {
                container.innerHTML = '<p style="text-align:center;color:var(--text-light)">Нет новых лидов с квиза</p>';
                return;
            }
            
            container.innerHTML = quizLeadsNotInFunnel.map(lead => {
                const date = new Date(lead.created_at).toLocaleDateString('ru');
                return `
                <div class="lead-card" style="margin-bottom:20px">
                    <div class="lead-header">
                        <div>
                            <div class="lead-name">${lead.name || 'Без имени'}</div>
                            <div class="lead-meta">📱 ${lead.phone || lead.email || 'Нет контактов'}</div>
                            ${lead.age ? `<div class="lead-meta">👤 ${lead.age} лет</div>` : ''}
                            <div class="lead-meta">📅 ${date}</div>
                        </div>
                        <button class="btn btn-primary" onclick="addToFunnel(${lead.id})" style="padding:10px 20px">
                            В воронку
                        </button>
                    </div>
                    <div style="margin-top:15px">
                        <div class="lead-tag" style="margin-bottom:10px">🎯 ${lead.main_block || 'Блок не определен'}</div>
                        ${lead.quiz_answers ? `
                            <div style="background:var(--bg);box-shadow:var(--shadow-inset);padding:15px;border-radius:10px;margin-top:10px">
                                <div style="font-weight:600;margin-bottom:10px">Ответы на квиз:</div>
                                ${lead.quiz_answers.currentIncome ? `<div>💰 Текущий доход: €${lead.quiz_answers.currentIncome}</div>` : ''}
                                ${lead.quiz_answers.desiredIncome ? `<div>🎯 Желаемый доход: €${lead.quiz_answers.desiredIncome}</div>` : ''}
                            </div>
                        ` : ''}
                        ${lead.source || lead.utm_source ? `<div class="lead-tag" style="margin-top:10px">📍 ${lead.source || lead.utm_source}</div>` : ''}
                    </div>
                </div>
            `}).join('');
        }
        
        function updateStats() {
            const consultLeads = allLeads.filter(l => l.stage === 'consultation');
            const paidLeads = allLeads.filter(l => l.stage === 'paid');
            
            document.getElementById('totalLeads').textContent = allLeads.length;
            document.getElementById('consultations').textContent = consultLeads.length;
            document.getElementById('payments').textContent = paidLeads.length;
            document.getElementById('conversion').textContent = allLeads.length > 0 
                ? Math.round((paidLeads.length / allLeads.length) * 100) + '%' : '0%';
        }
        
        function showLeadDetails(leadId) {
            const lead = allLeads.find(l => l.id == leadId);
            if (!lead) return;
            
            document.getElementById('modalBody').innerHTML = `
                <div style="margin-bottom:20px">
                    <strong>Имя:</strong> ${lead.name || 'Не указано'}<br>
                    <strong>Телефон:</strong> ${lead.phone || 'Не указан'}<br>
                    <strong>Email:</strong> ${lead.email || 'Не указан'}<br>
                    <strong>Дата:</strong> ${new Date(lead.created_at).toLocaleString('ru')}
                </div>
                <button class="btn btn-primary" onclick="contactLead('${lead.phone}',${lead.id})" style="width:100%">
                    💬 Написать в WhatsApp
                </button>
            `;
            document.getElementById('leadModal').classList.add('active');
        }
        
        function contactLead(phone, leadId) {
            if (phone) {
                let cleanPhone = phone.replace(/[^\d+]/g, '').replace('+', '');
                window.open(`https://wa.me/${cleanPhone}`, '_blank');
            }
        }
        
        async function moveToNext(leadId) {
            const lead = allLeads.find(l => l.id == leadId);
            if (!lead) return;
            
            const stages = ['new', 'consultation', 'paid'];
            const currentIndex = stages.indexOf(lead.stage);
            
            if (currentIndex < stages.length - 1) {
                lead.stage = stages[currentIndex + 1];
                
                try {
                    if (typeof window.supabase !== 'undefined') {
                        const { createClient } = window.supabase;
                        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
                        await supabase.from('quiz_leads').update({ stage: lead.stage }).eq('id', leadId);
                    }
                } catch (error) {
                    console.error('Failed to update:', error);
                }
                
                renderAll();
            }
        }
        
        async function addToFunnel(leadId) {
            const lead = quizLeadsNotInFunnel.find(l => l.id == leadId);
            if (!lead) return;
            
            // Update stage to move from quiz to funnel
            lead.stage = 'new';
            
            try {
                if (typeof window.supabase !== 'undefined') {
                    const { createClient } = window.supabase;
                    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
                    
                    const { data, error } = await supabase
                        .from('quiz_leads')
                        .update({ stage: 'new' })
                        .eq('id', leadId);
                    
                    if (!error) {
                        // Move from quiz list to funnel
                        quizLeadsNotInFunnel = quizLeadsNotInFunnel.filter(l => l.id !== leadId);
                        allLeads.unshift(lead);
                    } else {
                        console.error('Failed to update:', error);
                    }
                }
            } catch (error) {
                console.error('Failed to add to funnel:', error);
            }
            
            renderAll();
        }
        
        async function addAllToFunnel() {
            if (quizLeadsNotInFunnel.length === 0) return;
            
            const leadIds = quizLeadsNotInFunnel.map(l => l.id);
            
            try {
                if (typeof window.supabase !== 'undefined') {
                    const { createClient } = window.supabase;
                    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
                    
                    const { error } = await supabase
                        .from('quiz_leads')
                        .update({ stage: 'new' })
                        .in('id', leadIds);
                    
                    if (!error) {
                        quizLeadsNotInFunnel.forEach(lead => {
                            lead.stage = 'new';
                            allLeads.unshift(lead);
                        });
                        quizLeadsNotInFunnel = [];
                    } else {
                        console.error('Failed to update:', error);
                    }
                }
            } catch (error) {
                console.error('Failed to add all to funnel:', error);
            }
            
            renderAll();
        }
                    const { data, error } = await supabase.from('crm_leads').insert(newCrmLeads).select();
                    
                    if (data) {
                        allLeads.unshift(...data);
                        quizLeadsNotInFunnel = [];
                    }
                }
            } catch (error) {
                console.error('Failed to add all:', error);
            }
            
            renderAll();
        }
        
        // Setup drag & drop
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.kanban-column').forEach(column => {
                column.addEventListener('dragover', e => { e.preventDefault(); column.style.background = '#d0d5dc'; });
                column.addEventListener('dragleave', e => { column.style.background = ''; });
                column.addEventListener('drop', async e => {
                    e.preventDefault();
                    column.style.background = '';
                    
                    if (draggedElement) {
                        const container = column.querySelector('.leads-container');
                        container.appendChild(draggedElement);
                        
                        const leadId = parseInt(draggedElement.dataset.id);
                        const newStage = column.dataset.stage;
                        const lead = allLeads.find(l => l.id == leadId);
                        
                        if (lead && lead.stage !== newStage) {
                            lead.stage = newStage;
                            
                            try {
                                if (typeof window.supabase !== 'undefined') {
                                    const { createClient } = window.supabase;
                                    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
                                    await supabase.from('quiz_leads').update({ stage: newStage }).eq('id', leadId);
                                }
                            } catch (error) {
                                console.error('Failed to update:', error);
                            }
                            
                            renderAll();
                        }
                    }
                });
            });
            
            // Setup form
            document.getElementById('addLeadForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const newLead = {
                    name: document.getElementById('leadName').value,
                    phone: document.getElementById('leadPhone').value,
                    email: document.getElementById('leadEmail').value || null,
                    age: document.getElementById('leadAge').value ? parseInt(document.getElementById('leadAge').value) : null,
                    source: document.getElementById('leadSource').value,
                    stage: document.getElementById('leadStage').value,
                    created_at: new Date().toISOString()
                };
                
                try {
                    if (typeof window.supabase !== 'undefined') {
                        const { createClient } = window.supabase;
                        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
                        const { data, error } = await supabase.from('quiz_leads').insert([newLead]).select().single();
                        if (data) newLead.id = data.id;
                    } else {
                        newLead.id = Date.now();
                    }
                } catch (error) {
                    console.error('Failed to add:', error);
                    newLead.id = Date.now();
                }
                
                allLeads.unshift(newLead);
                renderAll();
                closeAddLeadModal();
            });
            
            loadData();
        });
        
        // Global functions
        window.showTab = showTab;
        window.showAddLeadModal = showAddLeadModal;
        window.closeAddLeadModal = closeAddLeadModal;
        window.closeModal = closeModal;
        window.logout = logout;
        window.showLeadDetails = showLeadDetails;
        window.contactLead = contactLead;
        window.moveToNext = moveToNext;
        window.addToFunnel = addToFunnel;
        window.addAllToFunnel = addAllToFunnel;
    </script>
</body>
