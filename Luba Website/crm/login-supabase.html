<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Login - Денежный Водопад</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #6b46c1;
            text-align: center;
            margin-bottom: 30px;
        }
        .icon {
            font-size: 50px;
            text-align: center;
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #6b46c1;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover { background: #553c9a; }
        .error {
            color: #ef4444;
            text-align: center;
            margin-top: 10px;
            display: none;
        }
        .info {
            background: #f3f4f6;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">💰</div>
        <h1>CRM Денежный Водопад</h1>
        
        <form id="loginForm">
            <label>Email</label>
            <input type="text" id="email" value="Luba" required>
            
            <label>Пароль</label>
            <input type="password" id="password" required>
            
            <button type="submit">Войти</button>
        </form>
        
        <div class="error" id="error"></div>
        
        <div class="info">
            <strong>Демо доступ:</strong><br>
            Email: admin (или Luba)<br>
            Пароль: admin123
        </div>
    </div>
    
    <script>
        // Simple demo login - no Supabase needed
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error');
            
            // Demo credentials
            const validEmails = ['admin', 'luba', 'admin@lyubovpsy.com'];
            const validPassword = 'admin123';
            
            if (validEmails.includes(email) && password === validPassword) {
                // Set session
                localStorage.setItem('crm_authenticated', 'true');
                localStorage.setItem('crm_user', JSON.stringify({
                    email: email,
                    role: 'admin',
                    name: 'Администратор'
                }));
                
                // Redirect to dashboard
                window.location.href = '/crm/dashboard.html';
            } else {
                errorDiv.textContent = 'Неверный email или пароль';
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
