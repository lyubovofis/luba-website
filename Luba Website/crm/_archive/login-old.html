<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в CRM - Денежный Водопад</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg: #e0e5ec;
            --primary: #7c3aed;
            --primary-light: #a78bfa;
            --text: #1e293b;
            --text-light: #64748b;
            --shadow: 9px 9px 16px #a3b1c6, -9px -9px 16px #ffffff;
            --shadow-inset: inset 6px 6px 10px #a3b1c6, inset -6px -6px 10px #ffffff;
            --radius: 20px;
            --danger: #ef4444;
            --success: #10b981;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-container { width: 100%; max-width: 450px; }
        
        .login-card {
            background: var(--bg);
            border-radius: var(--radius);
            padding: 50px 40px;
            box-shadow: var(--shadow);
        }
        
        .logo-section { text-align: center; margin-bottom: 40px; }
        
        .logo-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            color: white;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
        }
        
        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .subtitle {
            color: var(--text-light);
            font-size: 14px;
        }
        
        .form-group { margin-bottom: 25px; }
        
        .form-label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            font-size: 14px;
            color: var(--text);
        }
        
        .form-input {
            width: 100%;
            padding: 14px 18px;
            background: var(--bg);
            box-shadow: var(--shadow-inset);
            border: none;
            border-radius: 12px;
            font-size: 15px;
            color: var(--text);
            transition: all 0.3s;
        }
        
        .form-input:focus {
            outline: none;
            box-shadow: var(--shadow-inset), 0 0 0 3px var(--primary-light);
        }
        
        .form-input::placeholder {
            color: var(--text-light);
            opacity: 0.6;
        }
        
        .btn {
            width: 100%;
            padding: 14px 24px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            box-shadow: var(--shadow);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(124, 58, 237, 0.3);
        }
        
        .btn-primary:active { transform: translateY(0); }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .error-message {
            background: #fee2e2;
            color: var(--danger);
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }
        
        .success-message {
            background: #dcfce7;
            color: var(--success);
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }
        
        .remember-section {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 20px 0;
        }
        
        .checkbox {
            width: 20px;
            height: 20px;
            background: var(--bg);
            box-shadow: var(--shadow-inset);
            border: none;
            border-radius: 6px;
            cursor: pointer;
            position: relative;
            appearance: none;
        }
        
        .checkbox:checked {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            box-shadow: var(--shadow);
        }
        
        .checkbox:checked::after {
            content: '✓';
            color: white;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 12px;
        }
        
        .footer {
            text-align: center;
            margin-top: 30px;
            color: var(--text-light);
            font-size: 13px;
        }
        
        @media (max-width: 480px) {
            .login-card { padding: 40px 30px; }
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo-section">
                <div class="logo-icon">💰</div>
                <h1>CRM Pro</h1>
                <p class="subtitle">Денежный Водопад</p>
            </div>
            
            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-input" id="email" placeholder="lyubov.ofis@gmail.com" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Пароль</label>
                    <input type="password" class="form-input" id="password" placeholder="Введите пароль" required>
                </div>
                
                <div class="remember-section">
                    <input type="checkbox" class="checkbox" id="remember" checked>
                    <label for="remember" style="cursor:pointer">Запомнить на 14 дней</label>
                </div>
                
                <button type="submit" class="btn btn-primary" id="loginBtn">
                    Войти в систему
                </button>
            </form>
            
            <div class="footer">
                <p>© 2025 Любовь Лукащук</p>
                <p style="margin-top:10px;font-size:11px">
                    Используется: lyubov.ofis@gmail.com / Luba1488@<br>
                    или Luba / Luba1488@ (legacy)
                </p>
            </div>
        </div>
    </div>
    
    <script>
        const SUPABASE_URL = 'https://rntranckosfsnaakirqh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJudHJhbmNrb3Nmc25hYWtpcnFoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzI2MzY0MjYsImV4cCI6MjA0ODIxMjQyNn0.oaBupXryNkc1NlPV7qlanC8KFBydPygR1lncVl1qzfE';
        
        // Check if already logged in
        const isAuthenticated = localStorage.getItem('crm_authenticated');
        const authExpiration = localStorage.getItem('crm_auth_expiration');
        
        if (isAuthenticated && authExpiration) {
            const now = new Date().getTime();
            const expiration = parseInt(authExpiration);
            
            if (now < expiration) {
                window.location.href = '/crm/';
            } else {
                localStorage.removeItem('crm_authenticated');
                localStorage.removeItem('crm_auth_expiration');
                localStorage.removeItem('crm_user');
            }
        }
        
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;
            const loginBtn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMessage');
            const successMsg = document.getElementById('successMessage');
            
            // Disable button
            loginBtn.disabled = true;
            loginBtn.textContent = 'Проверка...';
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';
            
            try {
                // Method 1: Hardcoded credentials (backward compatibility)
                if (email === 'Luba' && password === 'Luba1488@') {
                    authenticateUser('Luba', 'Любовь Лукащук', 'admin', remember);
                    return;
                }
                
                // Method 2: Check admin_users table
                if (typeof window.supabase !== 'undefined') {
                    const { createClient } = window.supabase;
                    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
                    
                    const { data, error } = await supabase
                        .from('admin_users')
                        .select('*')
                        .eq('email', email)
                        .eq('is_active', true)
                        .single();
                    
                    if (data && !error) {
                        // Simple password check (in production, use proper hashing)
                        if (password === 'Luba1488@' || password === 'admin') {
                            // Update last_login
                            await supabase
                                .from('admin_users')
                                .update({ last_login: new Date().toISOString() })
                                .eq('id', data.id);
                            
                            authenticateUser(data.email, data.full_name, data.role, remember);
                            return;
                        }
                    }
                }
                
                // Authentication failed
                throw new Error('Неверный email или пароль');
                
            } catch (error) {
                errorMsg.textContent = error.message || 'Ошибка входа';
                errorMsg.style.display = 'block';
                
                // Shake animation
                document.querySelector('.login-card').style.animation = 'shake 0.5s';
                setTimeout(() => {
                    document.querySelector('.login-card').style.animation = '';
                }, 500);
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = 'Войти в систему';
            }
        });
        
        function authenticateUser(username, fullName, role, remember) {
            // Set authentication
            localStorage.setItem('crm_authenticated', 'true');
            localStorage.setItem('crm_user', JSON.stringify({
                username: username,
                name: fullName,
                role: role
            }));
            
            // Set expiration
            if (remember) {
                const expirationDate = new Date();
                expirationDate.setDate(expirationDate.getDate() + 14);
                localStorage.setItem('crm_auth_expiration', expirationDate.getTime());
            } else {
                const expirationDate = new Date();
                expirationDate.setHours(expirationDate.getHours() + 24);
                localStorage.setItem('crm_auth_expiration', expirationDate.getTime());
            }
            
            // Show success and redirect
            document.getElementById('successMessage').textContent = 'Вход выполнен успешно!';
            document.getElementById('successMessage').style.display = 'block';
            document.getElementById('errorMessage').style.display = 'none';
            
            setTimeout(() => {
                window.location.href = '/crm/';
            }, 1000);
        }
    </script>
</body>
</html>
