<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в CRM - Денежный Водопад</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg: #e0e5ec;
            --primary: #7c3aed;
            --primary-light: #a78bfa;
            --text: #1e293b;
            --text-light: #64748b;
            --shadow: 9px 9px 16px #a3b1c6, -9px -9px 16px #ffffff;
            --shadow-inset: inset 6px 6px 10px #a3b1c6, inset -6px -6px 10px #ffffff;
            --radius: 20px;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-container {
            width: 100%;
            max-width: 450px;
        }
        
        .login-card {
            background: var(--bg);
            border-radius: var(--radius);
            padding: 50px 40px;
            box-shadow: var(--shadow);
        }
        
        .logo-section {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .logo-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            color: white;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
        }
        
        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .subtitle {
            color: var(--text-light);
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            font-size: 14px;
            color: var(--text);
        }
        
        .form-input {
            width: 100%;
            padding: 14px 18px;
            background: var(--bg);
            box-shadow: var(--shadow-inset);
            border: none;
            border-radius: 12px;
            font-size: 15px;
            color: var(--text);
            transition: all 0.3s;
        }
        
        .form-input:focus {
            outline: none;
            box-shadow: var(--shadow-inset), 0 0 0 3px var(--primary-light);
        }
        
        .form-input::placeholder {
            color: var(--text-light);
            opacity: 0.6;
        }
        
        .btn {
            width: 100%;
            padding: 14px 24px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            box-shadow: var(--shadow);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(124, 58, 237, 0.3);
        }
        
        .btn-primary:active {
            transform: translateY(0);
        }
        
        .error-message {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }
        
        .success-message {
            background: #dcfce7;
            color: #16a34a;
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }
        
        .remember-section {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 20px 0;
        }
        
        .checkbox {
            width: 20px;
            height: 20px;
            background: var(--bg);
            box-shadow: var(--shadow-inset);
            border: none;
            border-radius: 6px;
            cursor: pointer;
            position: relative;
            appearance: none;
        }
        
        .checkbox:checked {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            box-shadow: var(--shadow);
        }
        
        .checkbox:checked::after {
            content: '✓';
            color: white;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 12px;
        }
        
        .footer {
            text-align: center;
            margin-top: 30px;
            color: var(--text-light);
            font-size: 13px;
        }
        
        @media (max-width: 480px) {
            .login-card {
                padding: 40px 30px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo-section">
                <div class="logo-icon">💰</div>
                <h1>CRM Pro</h1>
                <p class="subtitle">Денежный Водопад</p>
            </div>
            
            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">Логин</label>
                    <input type="text" class="form-input" id="username" placeholder="Введите логин" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Пароль</label>
                    <input type="password" class="form-input" id="password" placeholder="Введите пароль" required>
                </div>
                
                <div class="remember-section">
                    <input type="checkbox" class="checkbox" id="remember">
                    <label for="remember" style="cursor:pointer">Запомнить на 14 дней</label>
                </div>
                
                <button type="submit" class="btn btn-primary">
                    Войти в систему
                </button>
            </form>
            
            <div class="footer">
                <p>© 2025 Любовь Лукащук</p>
            </div>
        </div>
    </div>
    
    <script>
        // Check if already logged in
        const isAuthenticated = localStorage.getItem('crm_authenticated');
        const authExpiration = localStorage.getItem('crm_auth_expiration');
        
        if (isAuthenticated && authExpiration) {
            const now = new Date().getTime();
            const expiration = parseInt(authExpiration);
            
            if (now < expiration) {
                window.location.href = '/crm/';
            } else {
                localStorage.removeItem('crm_authenticated');
                localStorage.removeItem('crm_auth_expiration');
                localStorage.removeItem('crm_user');
            }
        }
        
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;
            
            // Check credentials
            if (username === 'Luba' && password === 'Luba1488@') {
                // Set authentication
                localStorage.setItem('crm_authenticated', 'true');
                localStorage.setItem('crm_user', JSON.stringify({
                    username: 'Luba',
                    name: 'Любовь Лукащук',
                    role: 'admin'
                }));
                
                // Set expiration based on remember checkbox
                if (remember) {
                    const expirationDate = new Date();
                    expirationDate.setDate(expirationDate.getDate() + 14);
                    localStorage.setItem('crm_auth_expiration', expirationDate.getTime());
                } else {
                    // 24 hours if not remembered
                    const expirationDate = new Date();
                    expirationDate.setHours(expirationDate.getHours() + 24);
                    localStorage.setItem('crm_auth_expiration', expirationDate.getTime());
                }
                
                // Show success and redirect
                document.getElementById('successMessage').textContent = 'Вход выполнен успешно!';
                document.getElementById('successMessage').style.display = 'block';
                document.getElementById('errorMessage').style.display = 'none';
                
                setTimeout(() => {
                    window.location.href = '/crm/';
                }, 1000);
            } else {
                // Show error
                document.getElementById('errorMessage').textContent = 'Неверный логин или пароль';
                document.getElementById('errorMessage').style.display = 'block';
                document.getElementById('successMessage').style.display = 'none';
                
                // Shake effect
                document.querySelector('.login-card').style.animation = 'shake 0.5s';
                setTimeout(() => {
                    document.querySelector('.login-card').style.animation = '';
                }, 500);
            }
        });
    </script>
    
    <style>
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
    </style>
</body>
</html>
