<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в CRM - Денежный Водопад</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
        }
        
        .logo {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 10px;
        }
        
        .title {
            text-align: center;
            font-size: 1.5rem;
            color: #6b46c1;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #374151;
        }
        
        .form-input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #6b46c1;
        }
        
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #6b46c1;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn:hover {
            background: #553c9a;
            transform: translateY(-2px);
        }
        
        .error {
            color: #ef4444;
            font-size: 0.875rem;
            margin-top: 10px;
            display: none;
        }
        
        .error.active {
            display: block;
        }
        
        .demo-info {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e5e7eb;
            text-align: center;
            color: #6b7280;
            font-size: 0.875rem;
        }
        
        .demo-info code {
            background: #f3f4f6;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">💰</div>
        <h1 class="title">CRM Денежный Водопад</h1>
        
        <form id="loginForm">
            <div class="form-group">
                <label class="form-label">Email или логин</label>
                <input type="text" class="form-input" id="email" required>
            </div>
            
            <div class="form-group">
                <label class="form-label">Пароль</label>
                <input type="password" class="form-input" id="password" required>
            </div>
            
            <button type="submit" class="btn">Войти</button>
            
            <div class="error" id="error">Неверный логин или пароль</div>
        </form>
    </div>
    
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error');
            
            // Simple auth check
            if ((email === 'Luba' || email === 'lyubov.ofis@gmail.com') && 
                password === 'Luba1488@') {
                
                // Save token
                localStorage.setItem('crm_token', btoa(email + ':' + password));
                localStorage.setItem('crm_user', email);
                
                // Redirect to dashboard
                window.location.href = 'dashboard-new.html';
            } else {
                errorDiv.classList.add('active');
                setTimeout(() => errorDiv.classList.remove('active'), 3000);
            }
        });
    </script>
</body>
</html>
