<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Login - Денежный Водопад | lyubovpsy.com</title>
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .logo-icon {
            font-size: 50px;
            margin-bottom: 10px;
        }
        
        h1 {
            color: #6b46c1;
            text-align: center;
            margin-bottom: 30px;
            font-size: 24px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #374151;
            font-weight: 500;
        }
        
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.2s;
        }
        
        input:focus {
            outline: none;
            border-color: #6b46c1;
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            background: #6b46c1;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .btn:hover {
            background: #553c9a;
        }
        
        .btn:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }
        
        .error-message {
            color: #ef4444;
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
            display: none;
        }
        
        .success-message {
            color: #10b981;
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
            display: none;
        }
        
        .loading {
            display: none;
            text-align: center;
            color: #6b46c1;
            margin-top: 10px;
        }
        
        .info-box {
            background: #f3f4f6;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 14px;
            color: #6b7280;
        }
        
        .info-box strong {
            color: #374151;
        }
        
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        
        .back-link a {
            color: #6b46c1;
            text-decoration: none;
            font-size: 14px;
        }
        
        .back-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <div class="logo-icon">💰</div>
        </div>
        
        <h1>CRM Денежный Водопад</h1>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    placeholder="admin@lyubovpsy.com"
                    required
                    autocomplete="email"
                >
            </div>
            
            <div class="form-group">
                <label for="password">Пароль</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="••••••••"
                    required
                    autocomplete="current-password"
                >
            </div>
            
            <button type="submit" class="btn" id="loginBtn">
                Войти
            </button>
            
            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>
            <div class="loading" id="loading">Проверка...</div>
        </form>
        
        <div class="info-box">
            <strong>Демо доступ:</strong><br>
            Email: admin@lyubovpsy.com<br>
            Пароль: admin123
        </div>
        
        <div class="back-link">
            <a href="/">← Вернуться на сайт</a>
        </div>
    </div>
    
    <script>
        // Supabase configuration
        const SUPABASE_URL = 'https://rntranckosfsnaakjrqh.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJudHJhbmNrb3Nmc25hYWtqcnFoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTgyOTUyNTIsImV4cCI6MjA3Mzg3MTI1Mn0.Nme48al5xSVPlD4l40z6ZPwTkSL0uC3JQ300IZu7WBA';
        
        let supabase;
        
        // Initialize Supabase
        window.addEventListener('DOMContentLoaded', function() {
            try {
                const { createClient } = window.supabase;
                supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
                    auth: {
                        autoRefreshToken: true,
                        persistSession: true,
                        detectSessionInUrl: true
                    }
                });
                console.log('Supabase initialized');
                
                // Check if already logged in
                checkAuth();
            } catch (error) {
                console.error('Failed to initialize Supabase:', error);
                showError('Ошибка инициализации. Попробуйте обновить страницу.');
            }
        });
        
        // Check authentication status
        async function checkAuth() {
            // First check demo auth
            if (localStorage.getItem('crm_authenticated') === 'true') {
                window.location.href = '/crm/dashboard.html';
                return;
            }
            
            // Then check Supabase auth
            try {
                const { data: { session } } = await supabase.auth.getSession();
                if (session) {
                    window.location.href = '/crm/dashboard.html';
                }
            } catch (error) {
                console.error('Auth check error:', error);
            }
        }
        
        // Handle login form submission
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            
            // Clear previous messages
            hideMessages();
            
            // Show loading
            showLoading();
            disableForm(true);
            
            try {
                // For demo purposes, accept multiple admin emails
                const validEmails = ['admin@lyubovpsy.com', 'admin@lubawaterfall.com', 'luba', 'admin'];
                const validPassword = 'admin123';
                
                if ((validEmails.includes(email) || email.includes('@lyubovpsy.com')) && password === validPassword) {
                    // Set demo session in localStorage
                    localStorage.setItem('crm_authenticated', 'true');
                    localStorage.setItem('crm_user', JSON.stringify({
                        email: email,
                        role: 'admin',
                        name: 'Администратор'
                    }));
                    
                    showSuccess('Успешный вход! Перенаправление...');
                    
                    // Redirect to dashboard
                    setTimeout(() => {
                        window.location.href = '/crm/dashboard.html';
                    }, 1000);
                } else {
                    // Try Supabase Auth (for future real implementation)
                    const { data, error } = await supabase.auth.signInWithPassword({
                        email: email,
                        password: password
                    });
                    
                    if (error) {
                        throw new Error('Неверный email или пароль');
                    }
                    
                    if (data.session) {
                        // Also set localStorage for consistency
                        localStorage.setItem('crm_authenticated', 'true');
                        localStorage.setItem('crm_user', JSON.stringify({
                            email: email,
                            role: 'admin',
                            name: 'Администратор'
                        }));
                        
                        showSuccess('Успешный вход! Перенаправление...');
                        setTimeout(() => {
                            window.location.href = '/crm/dashboard.html';
                        }, 1000);
                    }
                }
            } catch (error) {
                console.error('Login error:', error);
                showError(error.message || 'Неверный email или пароль');
            } finally {
                hideLoading();
                disableForm(false);
            }
        });
        
        // UI Helper functions
        function showError(message) {
            const errorEl = document.getElementById('errorMessage');
            errorEl.textContent = message;
            errorEl.style.display = 'block';
        }
        
        function showSuccess(message) {
            const successEl = document.getElementById('successMessage');
            successEl.textContent = message;
            successEl.style.display = 'block';
        }
        
        function showLoading() {
            document.getElementById('loading').style.display = 'block';
        }
        
        function hideLoading() {
            document.getElementById('loading').style.display = 'none';
        }
        
        function hideMessages() {
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('successMessage').style.display = 'none';
        }
        
        function disableForm(disabled) {
            document.getElementById('email').disabled = disabled;
            document.getElementById('password').disabled = disabled;
            document.getElementById('loginBtn').disabled = disabled;
        }
    </script>
</body>
</html>
