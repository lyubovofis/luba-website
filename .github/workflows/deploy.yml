name: Deploy to GitHub Pages

on:
  workflow_dispatch:  # Manual trigger only — auto-deploy disabled (Vercel handles production)

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          cname: lubawaterfall.com
